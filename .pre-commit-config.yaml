default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/nicklockwood/SwiftFormat
    rev: "0.61.0"
    hooks:
      - id: swiftformat

  - repo: https://github.com/realm/SwiftLint
    rev: "0.63.0"
    hooks:
      - id: swiftlint
        args: ["--strict"]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: "v4.4.0"
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
